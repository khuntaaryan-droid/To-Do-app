
<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:700px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        form{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
        }

        .add-btn{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        .add-btn:hover{
            background:#1d4ed8;
        }

        .task-list{
            margin-top:25px;
        }

        .task{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f8fafc;
            padding:15px;
            margin-bottom:10px;
            border-radius:10px;
        }

        .completed{
            text-decoration:line-through;
            color:gray;
        }

        .actions a{
            text-decoration:none;
            padding:8px 12px;
            border-radius:6px;
            color:white;
            margin-left:5px;
            font-size:14px;
        }

        .complete{
            background:#22c55e;
        }

        .edit{
            background:#f59e0b;
        }

        .delete{
            background:#ef4444;
        }

        .empty{
            text-align:center;
            color:#888;
            margin-top:20px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>📝 Todo Task</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Add a new task..." required>
        <button class="add-btn">Add</button>
    </form>

    <div class="task-list">

        {% for task in tasks %}

        <div class="task">

            <div>

                {% if task.completed %}
                    <span class="completed">{{ task.title }}</span>
                {% else %}
                    {{ task.title }}
                {% endif %}

            </div>

            <div class="actions">

                <a class="complete" href="{% url 'complete' task.id %}">
                    {% if task.completed %}
                        Undo
                    {% else %}
                        Done
                    {% endif %}
                </a>

                <a class="edit" href="{% url 'edit' task.id %}">
                    Edit
                </a>

                <a class="delete" href="{% url 'delete' task.id %}">
                    Delete
                </a>

            </div>

        </div>

        {% empty %}

        <p class="empty">No Tasks Added Yet 🚀</p>

        {% endfor %}

    </div>

</div>

</body>
</html>
